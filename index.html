<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>さいきょう</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 500px;
    }
    h1 {
      font-size: 20px;
      margin-bottom: 20px;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    .button-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    button {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }
    .active {
      background: #2563eb;
      color: white;
    }
    .inactive {
      background: #e5e7eb;
    }
    .generate {
      width: 100%;
      background: #111827;
      color: white;
      margin-top: 10px;
    }
    .result {
      margin-top: 15px;
      text-align: center;
    }
    a {
      color: #2563eb;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>ツイート返信 / 引用 作成ツール</h1>

  <label>ツイートID または ツイートリンク</label>
  <input type="text" id="tweetInput" placeholder="例: 1234567890 または https://twitter.com/.../status/1234567890">

  <label>メッセージ内容</label>
  <textarea id="message" placeholder="ここに投稿内容を入力"></textarea>

  <label>開く投稿ページ数</label>
  <input type="number" id="openCount" value="1" min="1" max="20">

  <div class="button-group">
    <button id="replyBtn" class="active" onclick="setMode('reply')">リプライ</button>
    <button id="quoteBtn" class="inactive" onclick="setMode('quote')">引用</button>
  </div>

  <button class="generate" onclick="generateUrl()">ページ生成</button>

  <div class="result" id="result"></div>
</div>

<script>
  let mode = "reply";

  function setMode(selected) {
    mode = selected;
    document.getElementById("replyBtn").className = selected === "reply" ? "active" : "inactive";
    document.getElementById("quoteBtn").className = selected === "quote" ? "active" : "inactive";
  }

  function extractTweetId(input) {
    const urlMatch = input.match(/status\/(\d+)/);
    if (urlMatch) return urlMatch[1];
    if (/^\d+$/.test(input)) return input;
    return null;
  }

  function generateUrl() {
    const tweetInput = document.getElementById("tweetInput").value;
    const message = document.getElementById("message").value;
    const tweetId = extractTweetId(tweetInput);

    if (!tweetId) {
      alert("有効なツイートIDまたはリンクを入力してください");
      return;
    }

    // 8文字ランダム英数字生成
    function randomString(length) {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
      let result = '';
      for (let i = 0; i < length; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return result;
    }

    const finalMessage = message + " " + randomString(8);

    let url = "";

    if (mode === "reply") {
      url = `https://twitter.com/intent/tweet?in_reply_to=${tweetId}&text=${encodeURIComponent(finalMessage)}`;
    } else {
      url = `https://twitter.com/intent/tweet?url=https://twitter.com/i/web/status/${tweetId}&text=${encodeURIComponent(finalMessage)}`;
    }

    // 自動で投稿画面へ移動
    const count = parseInt(document.getElementById("openCount").value) || 1;

    for (let i = 0; i < count; i++) {
      window.open(url, '_blank');
    }
  }
</script>

</body>
</html>
